services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lebooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-lebooks}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lebooks} -d ${POSTGRES_DB:-lebooks}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      database_url: postgresql://${POSTGRES_USER:-lebooks}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-lebooks}
      jwt_secret_key: ${JWT_SECRET_KEY:-change-me}
      azure_communication_email_connection_string: ${AZURE_COMMUNICATION_EMAIL_CONNECTION_STRING:-}
      email_from: ${EMAIL_FROM:-onboarding@lebooks.it}
      email_logo_url: ${EMAIL_LOGO_URL:-}
      frontend_url: ${APP_SCHEME:-http}://${APP_HOST:-46.225.99.187}
      backend_base_url: ${APP_SCHEME:-http}://${APP_HOST:-46.225.99.187}/api
    volumes:
      - backend_uploads:/app/backend/uploads
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  caddy:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      APP_SITE: ${APP_SITE:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  backend_uploads:
  caddy_data:
  caddy_config:
